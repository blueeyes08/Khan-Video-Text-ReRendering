
<link href="https://cdn.jsdelivr.net/npm/@fontsource/caveat@5.1.1/400.css" rel="stylesheet">
<div style="padding: 1rem 0;">
  <div id="board" style="position: relative; width: 100%; aspect-ratio: 16/9; background: #1c1c1c; border-radius: var(--border-radius-lg); overflow: hidden;">
    <canvas id="cv" style="width: 100%; height: 100%; display: block;"></canvas>
    <div id="pill" style="position: absolute; top: 10px; left: 14px; font-size: 11px; font-family: var(--font-mono); color: rgba(255,255,255,0.5);"></div>
    <div id="tm" style="position: absolute; bottom: 8px; right: 14px; font-size: 11px; font-family: var(--font-mono); color: rgba(255,255,255,0.3);"></div>
  </div>
  <div style="margin-top: 1rem; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
    <button id="go">Play demo</button>
    <button id="rst">Reset</button>
    <select id="tgt" style="padding: 6px 10px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary);">
      <option value="sv">Svenska</option>
      <option value="bg">Bulgarian</option>
      <option value="de">Deutsch</option>
      <option value="es">Espanol</option>
      <option value="fr">Francais</option>
      <option value="lv">Latviesu</option>
      <option value="tr">Turkce</option>
      <option value="vi">Tieng Viet</option>
    </select>
    <div style="flex:1"></div>
    <span id="nfo" style="font-size: 12px; color: var(--color-text-secondary);"></span>
  </div>
  <div id="log" style="margin-top: 0.75rem; font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); line-height: 1.9; padding: 10px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); max-height: 180px; overflow-y: auto;"></div>
</div>
<script>
const T={
  sv:{"King Louis XIV":"Kung Ludvig XIV","France":"Frankrike","1643 - 1715":"1643 - 1715","Absolute Monarchy":"Envalde","The Sun King":"Solkungen"},
  bg:{"King Louis XIV":"\u041A\u0440\u0430\u043B \u041B\u0443\u0438 XIV","France":"\u0424\u0440\u0430\u043D\u0446\u0438\u044F","1643 - 1715":"1643 - 1715","Absolute Monarchy":"\u0410\u0431\u0441\u043E\u043B\u044E\u0442\u043D\u0430 \u043C\u043E\u043D\u0430\u0440\u0445\u0438\u044F","The Sun King":"\u041A\u0440\u0430\u043B\u044F\u0442 \u0421\u043B\u044A\u043D\u0446\u0435"},
  de:{"King Louis XIV":"K\u00F6nig Ludwig XIV","France":"Frankreich","1643 - 1715":"1643 - 1715","Absolute Monarchy":"Absolute Monarchie","The Sun King":"Der Sonnenk\u00F6nig"},
  es:{"King Louis XIV":"Rey Luis XIV","France":"Francia","1643 - 1715":"1643 - 1715","Absolute Monarchy":"Monarqu\u00EDa Absoluta","The Sun King":"El Rey Sol"},
  fr:{"King Louis XIV":"Roi Louis XIV","France":"France","1643 - 1715":"1643 - 1715","Absolute Monarchy":"Monarchie Absolue","The Sun King":"Le Roi Soleil"},
  lv:{"King Louis XIV":"Karalis Ludvigs XIV","France":"Francija","1643 - 1715":"1643 - 1715","Absolute Monarchy":"Absol\u016Bt\u0101 monarh.","The Sun King":"Saules karalis"},
  tr:{"King Louis XIV":"Kral Louis XIV","France":"Fransa","1643 - 1715":"1643 - 1715","Absolute Monarchy":"Mutlak Monar\u015Fi","The Sun King":"G\u00FCne\u015F Kral"},
  vi:{"King Louis XIV":"Vua Louis XIV","France":"Ph\u00E1p","1643 - 1715":"1643 - 1715","Absolute Monarchy":"Qu\u00E2n ch\u1EE7 chuy\u00EAn ch\u1EBF","The Sun King":"Vua M\u1EB7t Tr\u1EDDi"}
};
const R=[
  {id:"title", text:"King Louis XIV", x:0.05, y:0.18, sz:0.095, c:"#FFD54F", ws:0.3, we:4},
  {id:"place", text:"France", x:0.05, y:0.42, sz:0.065, c:"#81D4FA", ws:5, we:7.5},
  {id:"dates", text:"1643 - 1715", x:0.05, y:0.60, sz:0.055, c:"#CE93D8", ws:8.5, we:11},
  {id:"system", text:"Absolute Monarchy", x:0.52, y:0.18, sz:0.065, c:"#A5D6A7", ws:12, we:16},
  {id:"name", text:"The Sun King", x:0.52, y:0.42, sz:0.07, c:"#FFAB91", ws:17, we:20.5}
];
const cv=document.getElementById('cv'), cx=cv.getContext('2d');
const logE=document.getElementById('log'), pillE=document.getElementById('pill');
const tmE=document.getElementById('tm'), nfoE=document.getElementById('nfo');
let W,H,dpr,running=false,raf=null;
function fit(){const r=cv.getBoundingClientRect();dpr=window.devicePixelRatio||1;W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);}
fit();window.addEventListener('resize',()=>{fit();if(!running)idle();});
function lg(s){const d=document.createElement('div');d.textContent='> '+s;logE.appendChild(d);logE.scrollTop=1e6;}

function board(){
  cx.fillStyle='#1c1c1c';cx.fillRect(0,0,W,H);
  for(let i=0;i<50;i++){cx.fillStyle=`rgba(255,255,255,${Math.random()*0.013})`;cx.fillRect(Math.random()*W,Math.random()*H,Math.random()*2+0.5,Math.random()*2+0.5);}
}

function writeText(text,rx,ry,sz,col,progress){
  if(progress<=0)return;
  const px=rx*W, py=ry*H, fs=sz*H;
  const n=Math.max(0,Math.floor(text.length*Math.min(progress,1)));
  if(n===0)return;
  cx.font=`${fs}px Caveat, Georgia, serif`;
  let xp=px;
  for(let i=0;i<n;i++){
    const jx=Math.sin(i*7.3+rx*100)*1.0;
    const jy=Math.cos(i*5.1+ry*100)*0.7;
    cx.fillStyle=col;
    cx.fillText(text[i],xp+jx,py+jy);
    xp+=cx.measureText(text[i]).width;
  }
  if(progress<1){
    cx.fillStyle=`${col}88`;
    cx.fillRect(xp+2, py-fs*0.15, 2, fs*0.25);
  }
}

function diagClip(rx,ry,tw,th,progress){
  const px=rx*W-10, py=ry*H-th-6;
  const pw=tw+20, ph=th+16;
  const diag=Math.sqrt(pw*pw+ph*ph);
  const rev=diag*Math.min(progress,1);
  cx.save();
  cx.beginPath();
  cx.moveTo(px,py);
  if(rev<=pw){
    cx.lineTo(px+rev,py);
    cx.lineTo(px,py+Math.min(rev,ph));
  } else {
    cx.lineTo(px+pw,py);
    cx.lineTo(px+pw,py+Math.min(rev-pw,ph));
    if(rev-pw>=ph){cx.lineTo(px+Math.max(0,pw-(rev-pw-ph)),py+ph);}
    else{cx.lineTo(px,py+ph);}
    cx.lineTo(px,py+Math.min(rev,ph));
  }
  cx.closePath();
  cx.clip();
  cx.fillStyle='#1c1c1c';
  cx.fillRect(px,py,pw,ph);
  cx.restore();
}

function blackBox(r,text,progress){
  const fs=r.sz*H;
  cx.font=`${fs}px Caveat, Georgia, serif`;
  const tw=cx.measureText(text).width;
  diagClip(r.x, r.y, tw, fs*1.1, progress);
}

function scanBox(r,alpha){
  const px=r.x*W, py=r.y*H, fs=r.sz*H;
  cx.font=`${fs}px Caveat, Georgia, serif`;
  const tw=cx.measureText(r.text).width;
  cx.save();
  cx.strokeStyle=`rgba(40,220,120,${alpha})`;
  cx.lineWidth=1.5;cx.setLineDash([6,4]);
  cx.strokeRect(px-8,py-fs-4,tw+16,fs+14);
  cx.setLineDash([]);
  cx.fillStyle=`rgba(40,220,120,${alpha*0.8})`;
  cx.font='11px monospace';
  cx.fillText('OCR: "'+r.text+'"',px-8,py-fs-18);
  cx.restore();
}

function drawAll(excludeIdx){
  for(let i=0;i<R.length;i++){
    if(i===excludeIdx)continue;
    writeText(R[i].text,R[i].x,R[i].y,R[i].sz,R[i].c,1);
  }
}

function idle(){
  board();
  cx.fillStyle='rgba(255,255,255,0.2)';
  cx.font=`${H*0.04}px Caveat, Georgia, serif`;
  cx.textAlign='center';
  cx.fillText('Press "Play demo" to start',W/2,H/2);
  cx.textAlign='left';
  pillE.textContent='';tmE.textContent='';
}
idle();

function run(){
  if(running)return;running=true;
  logE.innerHTML='';nfoE.textContent='';
  const lang=document.getElementById('tgt').value;
  const tr=T[lang];
  const writeEnd=R[R.length-1].we;
  const p1Dur=writeEnd+1;
  let t0=performance.now();
  lg('Phase 1: Playing original Khan video (English)...');
  pillE.textContent='Phase 1: original video';

  function p1(){
    const el=(performance.now()-t0)/1000;
    board();
    for(const r of R){
      const rp=(el-r.ws)/(r.we-r.ws);
      if(rp>0)writeText(r.text,r.x,r.y,r.sz,r.c,rp);
    }
    tmE.textContent=`${Math.min(el,p1Dur).toFixed(1)}s`;
    if(el<p1Dur)raf=requestAnimationFrame(p1);
    else{lg('All English text written.');p2();}
  }
  raf=requestAnimationFrame(p1);

  function p2(){
    lg('');lg('Phase 2: Scanning frames BACKWARDS...');
    pillE.textContent='Phase 2: backwards scan + OCR';
    let idx=R.length-1;
    function next(){
      if(idx<0){p3();return;}
      const r=R[idx];
      board();drawAll(-1);
      scanBox(r,0.9);
      lg(`Found: "${r.text}" [${r.ws.toFixed(1)}s-${r.we.toFixed(1)}s]`);
      lg(`  -> ${lang.toUpperCase()}: "${tr[r.text]||r.text}"`);
      tmE.textContent=`scan t=${r.we.toFixed(1)}s`;
      idx--;
      setTimeout(next,1000);
    }
    setTimeout(next,500);
  }

  function p3(){
    lg('');lg('Phase 3: Overlay + localized handwriting...');
    pillE.textContent='Phase 3: diagonal overlay + handwriting';
    let ri=0,prog=0;
    const spd=0.008;
    let done=new Array(R.length).fill(false);

    function tick(){
      if(ri>=R.length){fin();return;}
      const r=R[ri];
      const translated=tr[r.text]||r.text;
      board();
      for(let i=0;i<R.length;i++){
        if(done[i]){
          blackBox(R[i],R[i].text,1);
          writeText(tr[R[i].text]||R[i].text,R[i].x,R[i].y,R[i].sz,R[i].c,1);
        } else if(i!==ri){
          writeText(R[i].text,R[i].x,R[i].y,R[i].sz,R[i].c,1);
        }
      }
      blackBox(r,r.text,Math.min(prog*1.6,1));
      if(prog>0.2){
        const tp=(prog-0.2)/0.8;
        writeText(translated,r.x,r.y,r.sz,r.c,tp);
      }
      tmE.textContent=`"${r.text}" -> "${translated}"`;
      nfoE.textContent=`Region ${ri+1} of ${R.length}`;
      prog+=spd;
      if(prog>=1.3){
        done[ri]=true;
        ri++;prog=0;
        setTimeout(()=>{raf=requestAnimationFrame(tick);},300);
      } else {
        raf=requestAnimationFrame(tick);
      }
    }
    raf=requestAnimationFrame(tick);
  }

  function fin(){
    running=false;
    pillE.textContent='Complete';
    nfoE.textContent='All regions localized';
    lg('');lg('Pipeline complete. Ready for audio dubbing.');
    lg(`${R.length} text regions localized to ${lang.toUpperCase()}`);
  }
}

document.getElementById('go').onclick=run;
document.getElementById('rst').onclick=()=>{if(raf)cancelAnimationFrame(raf);running=false;logE.innerHTML='';nfoE.textContent='';idle();};
</script>
